# Configuración de la base de datos Azure SQL
spring.datasource.url=${DB_URL:jdbc:sqlserver://sql-exoal-prototipo.database.windows.net:1433;database=db-exoal-prototipo;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Configuración JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Puerto del servidor
server.port=${PORT:8080}

# CORS - orígenes permitidos (separados por coma)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# JWT (usar JWT_SECRET en produccion - minimo 32 caracteres)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000