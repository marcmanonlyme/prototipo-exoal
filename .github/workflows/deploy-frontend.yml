name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - master
    paths:
      - 'frontend-exoal/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend-exoal/package-lock.json

      - name: Install dependencies
        working-directory: frontend-exoal
        run: npm ci

      - name: Build React app
        working-directory: frontend-exoal
        run: npm run build
        env:
          REACT_APP_API_URL: https://app-exoal-prototipo.azurewebsites.net/api

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend-exoal/build"
          skip_app_build: true
